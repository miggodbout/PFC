<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Project Log — PFC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root { --gold: #C4814E; --gold-dim: rgba(196,129,78,0.25); --dark: #0D0D0D; }

    html, body { height: 100%; overflow: hidden; background: var(--dark); font-family: Arial, sans-serif; color: white; }

    /* ── LIVE VIEWFINDER ─────────────────────────────── */
    #video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* ── TOP BAR ─────────────────────────────────────── */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: env(safe-area-inset-top, 16px) 20px 16px;
      padding-top: max(env(safe-area-inset-top, 16px), 16px);
      background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10;
    }

    .brand { display: flex; align-items: center; gap: 10px; }

    .brand img {
      width: 38px; height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--gold-dim);
    }

    .brand-text p:first-child {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: white;
    }
    .brand-text p:last-child {
      font-size: 9px; color: rgba(255,255,255,0.45);
      letter-spacing: 0.8px; text-transform: uppercase;
    }

    .unit-pill {
      font-size: 13px; font-weight: 700;
      color: var(--gold);
      background: var(--gold-dim);
      border: 1px solid rgba(196,129,78,0.5);
      border-radius: 20px;
      padding: 5px 14px;
      letter-spacing: 0.5px;
    }

    /* ── BOTTOM BAR ──────────────────────────────────── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 30px 20px max(env(safe-area-inset-bottom, 30px), 30px);
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }

    .capture-btn {
      width: 76px; height: 76px;
      border-radius: 50%;
      border: 3.5px solid white;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.1s, background 0.1s;
      -webkit-user-select: none; user-select: none;
    }
    .capture-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.35); }

    .capture-inner {
      width: 58px; height: 58px;
      border-radius: 50%;
      background: white;
    }

    /* ── FULL-SCREEN STATES ──────────────────────────── */
    .screen {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; padding: 48px 36px;
      text-align: center; z-index: 20;
      background: var(--dark);
    }
    .screen.active { display: flex; }

    .screen img.logo {
      width: 80px; height: 80px;
      border-radius: 50%; object-fit: cover;
      border: 1.5px solid var(--gold-dim);
      margin-bottom: 4px;
    }

    .screen .label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--gold);
    }

    .screen .sub {
      font-size: 9px; color: rgba(255,255,255,0.4);
      letter-spacing: 1px; text-transform: uppercase;
      margin-top: -10px;
    }

    .screen h2 { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .screen p  { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.6; }

    .screen-btn {
      background: none;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 30px;
      padding: 12px 36px;
      font-size: 13px; font-weight: 700;
      color: white; font-family: Arial, sans-serif;
      cursor: pointer; margin-top: 6px;
      transition: background 0.15s, border-color 0.15s;
    }
    .screen-btn:active { background: rgba(255,255,255,0.1); }

    .allow-btn {
      background: var(--gold);
      border: none;
      border-radius: 30px;
      padding: 14px 44px;
      font-size: 15px; font-weight: 700;
      color: white; font-family: Arial, sans-serif;
      cursor: pointer; margin-top: 8px;
    }
    .allow-btn:active { opacity: 0.8; }

    /* ── SPINNER ─────────────────────────────────────── */
    .spinner {
      width: 52px; height: 52px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ICON CIRCLES ────────────────────────────────── */
    .icon-circle {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .icon-success { background: #2D6A4F; }
    .icon-error   { background: #7F1D1D; }

    /* ── HIDE CAMERA UI WHEN SCREEN IS ACTIVE ────────── */
    body.overlay-active .top-bar,
    body.overlay-active .bottom-bar { display: none; }
  </style>
</head>
<body>

<!-- Live camera -->
<video id="video" autoplay playsinline muted></video>

<!-- Top bar -->
<div class="top-bar" id="top-bar" style="display:none;">
  <div class="brand">
    <img id="logo-top" alt="PFC">
    <div class="brand-text">
      <p>Project Log</p>
      <p>Premier Finish</p>
    </div>
  </div>
  <div class="unit-pill" id="unit-display">—</div>
</div>

<!-- Capture button -->
<div class="bottom-bar" id="bottom-bar" style="display:none;">
  <div class="capture-btn" id="capture-btn" role="button" aria-label="Capture photo">
    <div class="capture-inner"></div>
  </div>
</div>

<!-- PERMISSION SCREEN -->
<div class="screen active" id="screen-permission">
  <img class="logo" id="logo-perm" alt="PFC">
  <p class="label">Project Log</p>
  <p class="sub">Premier Finish & Construction</p>
  <h2>Camera Access</h2>
  <p>Tap below to allow camera access.<br>You'll only need to do this once.</p>
  <button class="allow-btn" id="allow-btn">Allow Camera</button>
</div>

<!-- UPLOADING SCREEN -->
<div class="screen" id="screen-loading">
  <div class="spinner"></div>
  <h2>Uploading…</h2>
  <p>Don't close this page.</p>
</div>

<!-- SUCCESS SCREEN -->
<div class="screen" id="screen-success">
  <div class="icon-circle icon-success">✓</div>
  <h2>Logged</h2>
  <p id="success-detail"></p>
  <p style="font-size:11px; color:rgba(255,255,255,0.3); margin-top:8px;">Scan next unit's QR to continue</p>
</div>

<!-- ERROR SCREEN -->
<div class="screen" id="screen-error">
  <div class="icon-circle icon-error">✕</div>
  <h2>Upload Failed</h2>
  <p>Check your connection and try again.</p>
  <button class="screen-btn" onclick="returnToCamera()">Try Again</button>
</div>

  // ── INJECT LOGO ───────────────────────────────────────────────────────────
  document.getElementById('logo-top').src  = LOGO_SRC;
  document.getElementById('logo-perm').src = LOGO_SRC;

  // ── URL PARAMS ────────────────────────────────────────────────────────────
  const params  = new URLSearchParams(window.location.search);
  const jobsite = params.get('job')  || 'Unknown-Job';
  const unit    = params.get('unit') || '???';

  document.getElementById('unit-display').textContent = 'Unit ' + unit;

  // ── ELEMENTS ──────────────────────────────────────────────────────────────
  const video     = document.getElementById('video');
  const topBar    = document.getElementById('top-bar');
  const bottomBar = document.getElementById('bottom-bar');
  const captureBtn = document.getElementById('capture-btn');

  let stream = null;

  // ── CAMERA ────────────────────────────────────────────────────────────────
  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1000 }, height: { ideal: 1000 } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      showScreen(null); // hide all screens, show live camera
    } catch (err) {
      showScreen('permission'); // show permission prompt
    }
  }

  document.getElementById('allow-btn').addEventListener('click', startCamera);

  // Try auto-start on load
  startCamera();

  // ── CAPTURE ───────────────────────────────────────────────────────────────
  captureBtn.addEventListener('click', async function () {
    if (!stream) return;

    const canvas = document.createElement('canvas');
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);

    showScreen('loading');

    canvas.toBlob(async function (blob) {
      try {
        const reader = new FileReader();
        reader.onloadend = function () {
          const base64 = reader.result.split(',')[1];

          // Show success immediately — upload runs in background
          document.getElementById('success-detail').textContent =
            'Unit ' + unit + '  ·  ' + jobsite.replace(/-/g, ' ');
          showScreen('success');

          // Fire and forget — browser keeps retrying on weak connection
          fetch(SCRIPT_URL, {
            method:  'POST',
            mode:    'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body:    JSON.stringify({ jobsite, unit, image: base64 })
          }).catch(function() {
            // Silent fail — upload queued by browser, will complete when signal allows
          });
        };
        reader.readAsDataURL(blob);
      } catch (err) {
        showScreen('error');
      }
    }, 'image/jpeg', 0.65);
  });

  // ── SCREEN HELPER ─────────────────────────────────────────────────────────
  const screens = ['permission', 'loading', 'success', 'error'];

  function showScreen(name) {
    screens.forEach(id => {
      document.getElementById('screen-' + id)
        .classList.toggle('active', id === name);
    });

    const cameraActive = !name;
    topBar.style.display    = cameraActive ? 'flex'  : 'none';
    bottomBar.style.display = cameraActive ? 'flex'  : 'none';
    document.body.classList.toggle('overlay-active', !!name && name !== 'permission');
  }

  function returnToCamera() { showScreen(null); }
</script>
</body>
</html>
