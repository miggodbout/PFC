<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Project Log — PFC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --gold:     #C4814E;
      --gold-dim: rgba(196,129,78,0.22);
      --dark:     #0D0D0D;
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--dark);
      font-family: Arial, sans-serif;
      color: white;
    }

    /* ── VIDEO ───────────────────────────────────────── */
    #video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }

    /* ── TOP BAR ─────────────────────────────────────── */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding: max(env(safe-area-inset-top,14px),14px) 16px 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, transparent 100%);
      display: flex; align-items: center; justify-content: space-between;
    }

    .brand { display: flex; align-items: center; gap: 9px; }

    .brand img {
      width: 36px; height: 36px; border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(196,129,78,0.4);
    }

    .brand-text p:first-child {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: white;
    }
    .brand-text p:last-child {
      font-size: 9px; color: rgba(255,255,255,0.4);
      letter-spacing: 0.8px; text-transform: uppercase; margin-top: 1px;
    }

    /* ── UNIT DROPDOWN ───────────────────────────────── */
    .unit-select-wrap {
      position: relative;
    }

    #unit-select {
      appearance: none; -webkit-appearance: none;
      background: var(--gold-dim);
      border: 1.5px solid var(--gold);
      border-radius: 20px;
      color: var(--gold);
      font-size: 12px; font-weight: 700;
      font-family: Arial, sans-serif;
      padding: 6px 28px 6px 13px;
      cursor: pointer;
      outline: none;
    }

    #unit-select option { background: #1a1a1a; color: white; }

    .select-arrow {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--gold); font-size: 9px;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }
    .shake { animation: shake 0.3s ease; }

    /* ── BOTTOM BAR ──────────────────────────────────── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      padding: 24px 20px max(env(safe-area-inset-bottom,28px),28px);
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
    }

    /* ── CAPTURE BUTTON ──────────────────────────────── */
    #capture-btn {
      width: 78px; height: 78px; border-radius: 50%;
      border: 3.5px solid white;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.1s, background 0.1s;
      -webkit-user-select: none; user-select: none;
    }
    #capture-btn:active { transform: scale(0.88); background: rgba(255,255,255,0.35); }

    .capture-inner {
      width: 60px; height: 60px; border-radius: 50%; background: white;
    }

    /* ── FOOTER ──────────────────────────────────────── */
    .footer-credit {
      font-size: 9px; color: rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
    }

    /* ── FULL SCREENS ────────────────────────────────── */
    .screen {
      position: fixed; inset: 0; z-index: 20;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 40px; text-align: center;
    }
    .screen.active { display: flex; }

    /* ── PERMISSION DENIED ───────────────────────────── */
    #screen-denied { background: var(--dark); }
    #screen-denied img {
      width: 72px; height: 72px; border-radius: 50%;
      border: 1.5px solid var(--gold-dim); margin-bottom: 4px;
    }
    #screen-denied .label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: var(--gold);
    }
    #screen-denied h2 { font-size: 20px; font-weight: 700; margin-top: 4px; }
    #screen-denied p  { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.6; }

    /* ── SUCCESS ─────────────────────────────────────── */
    #screen-success { background: rgba(0,0,0,0.88); }

    .success-circle {
      width: 78px; height: 78px; border-radius: 50%;
      background: #2D6A4F;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }

    #screen-success h2 { font-size: 26px; font-weight: 700; }
    #screen-success p  { font-size: 13px; color: rgba(255,255,255,0.5); }

    .progress-bar-wrap {
      width: 120px; height: 3px; background: rgba(255,255,255,0.15);
      border-radius: 2px; overflow: hidden; margin-top: 4px;
    }
    .progress-bar {
      height: 100%; background: var(--gold); border-radius: 2px;
      width: 0%;
      transition: width 2s linear;
    }
  </style>
</head>
<body>

<!-- Live camera -->
<video id="video" autoplay playsinline muted></video>

<!-- Top bar -->
<div class="top-bar" id="top-bar" style="display:none;">
  <div class="brand">
    <img id="logo-bar" alt="PFC">
    <div class="brand-text">
      <p>Project Log</p>
      <p>Premier Finish</p>
    </div>
  </div>
  <div class="unit-select-wrap">
    <select id="unit-select">
      <option value="">Select unit</option>
    </select>
    <span class="select-arrow">▼</span>
  </div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar" id="bottom-bar" style="display:none;">
  <div id="capture-btn" role="button" aria-label="Capture photo">
    <div class="capture-inner"></div>
  </div>
  <p class="footer-credit">Built by Miguel Godbout</p>
</div>

<!-- PERMISSION DENIED SCREEN -->
<div class="screen active" id="screen-denied">
  <img id="logo-denied" alt="PFC">
  <p class="label">Project Log</p>
  <h2>Camera Access Denied</h2>
  <p>Go to your phone Settings → Safari → Camera and allow access, then reload this page.</p>
</div>

<!-- SUCCESS SCREEN -->
<div class="screen" id="screen-success">
  <div class="success-circle">✓</div>
  <h2>Logged</h2>
  <p id="success-detail"></p>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
</div>

  // ── INJECT LOGO ────────────────────────────────────────────────────────────
  document.getElementById('logo-bar').src    = LOGO;
  document.getElementById('logo-denied').src = LOGO;

  // ── URL PARAMS ─────────────────────────────────────────────────────────────
  const params    = new URLSearchParams(window.location.search);
  const jobsite   = params.get('job')   || 'Unknown-Job';
  const unitCount = parseInt(params.get('units')) || 36;

  // ── GENERATE UNIT DROPDOWN ─────────────────────────────────────────────────
  const select     = document.getElementById('unit-select');
  const floorsCount = Math.ceil(unitCount / 12);

  for (let f = 1; f <= floorsCount; f++) {
    const group = document.createElement('optgroup');
    group.label = 'Floor ' + f;
    for (let u = 1; u <= 12; u++) {
      const opt = document.createElement('option');
      opt.value = f * 100 + u;
      opt.textContent = 'Unit ' + (f * 100 + u);
      group.appendChild(opt);
    }
    select.appendChild(group);
  }

  // ── CAMERA ─────────────────────────────────────────────────────────────────
  const video     = document.getElementById('video');
  const topBar    = document.getElementById('top-bar');
  const bottomBar = document.getElementById('bottom-bar');
  let   stream    = null;

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 1280 } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      showScreen(null);  // camera running — hide all screens
    } catch (err) {
      showScreen('denied');
    }
  }

  startCamera();

  // ── CAPTURE ────────────────────────────────────────────────────────────────
  document.getElementById('capture-btn').addEventListener('click', function () {
    const unit = select.value;

    // No unit selected — shake the dropdown
    if (!unit) {
      const wrap = document.querySelector('.unit-select-wrap');
      wrap.classList.remove('shake');
      void wrap.offsetWidth;
      wrap.classList.add('shake');
      setTimeout(() => wrap.classList.remove('shake'), 300);
      return;
    }

    // Capture frame
    const MAX    = 1000;
    const canvas = document.createElement('canvas');
    const ratio  = Math.min(MAX / video.videoWidth, MAX / video.videoHeight, 1);
    canvas.width  = Math.round(video.videoWidth  * ratio);
    canvas.height = Math.round(video.videoHeight * ratio);
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

    // Show success IMMEDIATELY
    document.getElementById('success-detail').textContent =
      'Unit ' + unit + '  ·  ' + jobsite.replace(/-/g, ' ');
    showScreen('success');

    // Animate progress bar
    const bar = document.getElementById('progress-bar');
    bar.style.transition = 'none'; bar.style.width = '0%';
    void bar.offsetWidth;
    bar.style.transition = 'width 2s linear'; bar.style.width = '100%';

    // Reset dropdown
    select.value = '';

    // Return to camera after 2s
    setTimeout(() => showScreen(null), 2000);

    // Upload in background — fire and forget
    canvas.toBlob(function (blob) {
      const reader = new FileReader();
      reader.onloadend = function () {
        fetch(SCRIPT_URL, {
          method:  'POST',
          mode:    'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body:    JSON.stringify({ jobsite, unit, image: reader.result.split(',')[1] })
        }).catch(function () {});
      };
      reader.readAsDataURL(blob);
    }, 'image/jpeg', 0.65);
  });

  // ── SCREEN HELPER ──────────────────────────────────────────────────────────
  function showScreen(name) {
    document.getElementById('screen-denied').classList.toggle('active', name === 'denied');
    document.getElementById('screen-success').classList.toggle('active', name === 'success');
    const cameraVisible = !name;
    topBar.style.display    = cameraVisible ? 'flex' : 'none';
    bottomBar.style.display = cameraVisible ? 'flex' : 'none';
  }
</script>
</body>
</html>
